name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: "2.2.4"

      - name: Run tests
        run: nimble test -y

  build:
    name: Build Linux binary
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: "2.2.4"

      - name: Build release smoke binary
        run: ./build.sh

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: posixglob-basic-linux-amd64
          path: build/posixglob-basic
          if-no-files-found: error

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download binary artifact
        uses: actions/download-artifact@v8
        with:
          name: posixglob-basic-linux-amd64
          path: dist

      - name: Attach binary to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          chmod +x dist/posixglob-basic
          gh release create "$TAG_NAME" \
            dist/posixglob-basic#posixglob-basic-linux-amd64 \
            --generate-notes \
            --title "$TAG_NAME"
