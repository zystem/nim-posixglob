when:
  - event: pull_request
  - event: push
    branch: main
  - event: tag
    ref: refs/tags/v*

steps:
  - name: test
    image: nimlang/nim:2.2.4
    commands:
      - nimble test -y

  - name: build
    image: nimlang/nim:2.2.4
    commands:
      - nimble buildRelease -y
      - cp build/posixglob-basic build/posixglob-basic-linux-amd64
    depends_on:
      - test

  - name: release
    image: ghcr.io/cli/cli:2.74.2
    commands:
      - GH_TOKEN="$CI_NETRC_PASSWORD" gh release create "$CI_COMMIT_TAG" build/posixglob-basic-linux-amd64 --generate-notes --repo "$CI_REPO" --title "$CI_COMMIT_TAG" || GH_TOKEN="$CI_NETRC_PASSWORD" gh release upload "$CI_COMMIT_TAG" build/posixglob-basic-linux-amd64 --clobber --repo "$CI_REPO"
    depends_on:
      - build
    when:
      - event: tag
        ref: refs/tags/v*
